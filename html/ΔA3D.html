<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; color: #0ff; font-family: monospace; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; font-size: 12px; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="ui">Δ-Space 4.2: Gravity Flow<br>指で三次元空間をかき回してください</div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let w, h, pts = [], mouse = {x: -1000, y: -1000, active: false};
const FL = 250; 

function res() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

function init() {
    pts = [];
    for(let i=0; i<400; i++) {
        pts.push({
            x: (Math.random()-0.5) * 500,
            y: (Math.random()-0.5) * 500,
            z: Math.random() * 800 - 400,
            vx: 0, vy: 0, vz: -3,
            hue: 180 + Math.random() * 60
        });
    }
}

// 入力検知
const handleInput = (e) => {
    const t = e.touches ? e.touches[0] : e;
    mouse.x = t.clientX;
    mouse.y = t.clientY;
    mouse.active = true;
};
canvas.addEventListener('touchstart', handleInput);
canvas.addEventListener('touchmove', handleInput);
canvas.addEventListener('touchend', () => mouse.active = false);
canvas.onmousedown = (e) => { handleInput(e); canvas.onmousemove = handleInput; };
window.onmouseup = () => { mouse.active = false; canvas.onmousemove = null; };

function loop() {
    ctx.fillStyle = 'rgba(0, 5, 12, 0.3)';
    ctx.fillRect(0, 0, w, h);

    pts.sort((a, b) => b.z - a.z);

    pts.forEach(p => {
        // 1. 基本の進行（奥から手前へ）
        p.z += p.vz;

        // 2. 指による重力演算（ここが追加！）
        let scale = FL / (FL + p.z + 400); 
        let sx = w/2 + p.x * scale;
        let sy = h/2 + p.y * scale;

        if (mouse.active) {
            let dx = mouse.x - sx;
            let dy = mouse.y - sy;
            let d = Math.sqrt(dx*dx + dy*dy);
            if (d < 300) {
                // 距離に応じて吸い寄せる力（Δ-Gravity）
                let force = (300 - d) * 0.02;
                p.x += (dx / d) * force / scale; // スケール補正して3D空間に戻す
                p.y += (dy / d) * force / scale;
                p.hue += 1; // 興奮して色が変わる
            }
        }

        // 3. DIR6的なゆらぎ（Pythonエンジンのエッセンス）
        p.x += (Math.random()-0.5) * 2;
        p.y += (Math.random()-0.5) * 2;

        // 投影描画
        if (scale > 0) {
            let size = Math.max(0.1, 5 * scale);
            let alpha = Math.min(1, scale * 2);
            let light = Math.floor(40 + scale * 50);

            ctx.fillStyle = `hsla(${p.hue}, 100%, ${light}%, ${alpha})`;
            ctx.beginPath();
            ctx.arc(sx, sy, size, 0, Math.PI * 2);
            ctx.fill();

            // 粒子リセット
            if (p.z < -FL) {
                p.z = 500;
                p.x = (Math.random()-0.5) * 600;
                p.y = (Math.random()-0.5) * 600;
                p.hue = 180 + Math.random() * 60;
            }
        }
    });

    requestAnimationFrame(loop);
}

window.onresize = res;
res(); init(); loop();
</script>
</body>
</html>
