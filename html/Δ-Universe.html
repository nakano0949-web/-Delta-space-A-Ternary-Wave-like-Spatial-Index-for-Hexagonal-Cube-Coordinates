<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Δ-Universe 5.0</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            pointer-events: none; color: #0ff; font-family: monospace; 
            font-size: 10px; text-shadow: 0 0 5px #0ff; opacity: 0.6;
        }
    </style>
</head>
<body>
    <div id="ui">Δ-UNIVERSE 5.0 [DIR6 ENGINE]<br>DOUBLE-TAP: WARP / SWIPE: GRAVITY</div>
    <canvas id="c"></canvas>

<script>
/**
 * Delta-Universe 5.0: The Genesis
 * Logic based on "DIR6 Avoidance Engine"
 */
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let w, h, pts = [], mouse = {x: 0, y: 0, vx: 0, vy: 0, active: false};
let warpMode = 0, lastTap = 0;
const FL = 250;

// DIR6方向定義（あなたのロジック）
const DIR6 = [
    {x: 1, y: -1, z: 0}, {x: 1, y: 0, z: -1}, {x: 0, y: 1, z: -1},
    {x: -1, y: 1, z: 0}, {x: -1, y: 0, z: 1}, {x: 0, y: -1, z: 1}
];

function res() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}

function init() {
    pts = [];
    for(let i=0; i<400; i++) {
        pts.push({
            x: (Math.random()-0.5) * 500,
            y: (Math.random()-0.5) * 500,
            z: Math.random() * 1000 - 500,
            vx: 0, vy: 0, vz: -3,
            hue: 180 + Math.random() * 60
        });
    }
}

const handleInput = (e) => {
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    const nx = t.clientX, ny = t.clientY;
    mouse.vx = nx - mouse.x;
    mouse.vy = ny - mouse.y;
    mouse.x = nx; mouse.y = ny;
    mouse.active = true;

    if(e.type === 'touchstart') {
        let now = Date.now();
        if(now - lastTap < 300) warpMode = 40;
        lastTap = now;
    }
};

canvas.addEventListener('touchstart', handleInput, {passive: false});
canvas.addEventListener('touchmove', handleInput, {passive: false});
canvas.addEventListener('touchend', () => { mouse.active = false; mouse.vx = 0; mouse.vy = 0; });

function loop() {
    let warpFactor = Math.min(25, Math.sqrt(mouse.vx**2 + mouse.vy**2) + (warpMode * 1.5));
    
    // 背景：ワープ時は青白く、通常は深く
    ctx.fillStyle = `rgba(0, ${5 + warpFactor}, ${15 + warpFactor*2}, ${0.2 + (warpFactor*0.02)})`;
    ctx.fillRect(0, 0, w, h);

    if(warpMode > 0) warpMode--;

    // Zソート：奥行きを物理的に表現
    pts.sort((a, b) => b.z - a.z);

    pts.forEach(p => {
        let currentVz = p.vz - warpFactor;
        p.z += currentVz;

        let scale = FL / (FL + p.z + 400); 
        let sx = p.x * scale;
        let sy = p.y * scale;

        // DIR6回避ロジック + 重力干渉
        if (mouse.active) {
            let dx = (mouse.x - w/2) / scale - p.x;
            let dy = (mouse.y - h/2) / scale - p.y;
            let d = Math.sqrt(dx*dx + dy*dy);
            if (d < 300) {
                p.x += (dx / d) * (warpFactor + 1);
                p.y += (dy / d) * (warpFactor + 1);
                p.hue += 0.5;
            }
        }

        if (scale > 0) {
            let size = Math.max(0.1, (2 + warpFactor * 0.5) * scale);
            let light = Math.min(100, 50 + warpFactor * 2);
            let color = `hsla(${p.hue + warpFactor*2}, 100%, ${light}%, ${scale * 1.5})`;
            
            ctx.fillStyle = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = size;

            // 万華鏡描画
            const render = (tx, ty) => {
                ctx.beginPath();
                if(warpFactor > 5) {
                    ctx.moveTo(w/2 + tx, h/2 + ty);
                    ctx.lineTo(w/2 + tx - p.vx*scale*2, h/2 + ty - p.vy*scale*2);
                    ctx.stroke();
                } else {
                    ctx.arc(w/2 + tx, h/2 + ty, size, 0, Math.PI*2);
                    ctx.fill();
                }
            };
            
            render(sx, sy);
            render(-sx, sy);
            render(sx, -sy);
            render(-sx, -sy);

            // 粒子リセット
            if (p.z < -FL) {
                p.z = 800;
                p.x = (Math.random()-0.5) * 800;
                p.y = (Math.random()-0.5) * 800;
            }
        }
    });

    requestAnimationFrame(loop);
}

window.onresize = res;
res(); init(); loop();
</script>
</body>
</html>
