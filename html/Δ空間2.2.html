<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Delta-space 2.0 | 6-Axis Greedy Engine</title>
    <style>
        :root { --neon: #00e5ff; --bg: #050505; --panel: rgba(10, 20, 25, 0.95); }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Consolas', monospace; overflow: hidden; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .panel {
            position: absolute; top: 20px; left: 20px; width: 340px;
            background: var(--panel); border: 1px solid #005a64; border-radius: 12px;
            padding: 20px; z-index: 10; backdrop-filter: blur(10px); cursor: pointer;
        }
        .panel.collapsed { height: 30px; width: 220px; overflow: hidden; }
        .key-box {
            background: rgba(0, 255, 136, 0.05); border: 1px solid #00ff88;
            color: #00ff88; padding: 10px; margin: 15px 0; font-size: 0.82em; border-radius: 6px; overflow-wrap: break-word;
        }
        .digit-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; margin-top: 10px; }
        .digit-item { color: #4fc3f7; font-size: 0.75em; border-left: 2px solid #005a64; padding-left: 5px; }
        .guide { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #333; font-size: 0.8em; pointer-events: none; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="panel" id="ui-panel">
        <h2 style="margin:0 0 15px 0; font-size:1.2em;">Delta-space 2.0 (DIR6)</h2>
        <div class="info-content">
            <div id="coords">座標: (-, -, -)</div>
            <div class="key-box" id="key-display">Key: 0x----------------</div>
            <div id="dist">L1 Dist: 0</div>
            <div style="margin-top:15px; border-top:1px solid #005a64; padding-top:10px;">
                <div style="font-size:0.8em; color:#88aeb2; margin-bottom:8px;">6-Axis Greedy Decomposition (12 Digits):</div>
                <div id="digits" class="digit-grid"></div>
            </div>
        </div>
    </div>
    <div class="guide">6-AXIS GREEDY RESIDUAL ENGINE | CLICK TO ENCODE</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const panel = document.getElementById('ui-panel');
        const hexSize = 18;

        panel.onclick = (e) => { if(!e.target.closest('.info-content')) panel.classList.toggle('collapsed'); };

        // Delta-space 2.0 根幹：6方向ベクトル (DIR6)
        const DIR6 = [
            {x: 1, y:-1, z: 0}, {x: 1, y: 0, z:-1}, {x: 0, y: 1, z:-1},
            {x:-1, y: 1, z: 0}, {x:-1, y: 0, z: 1}, {x: 0, y:-1, z: 1}
        ];

        function getCube(px, py) {
            let x = (px - window.innerWidth/2) / hexSize * (2/3);
            let z = (-(px - window.innerWidth/2)/3 + Math.sqrt(3)/3 * (py - window.innerHeight/2)) / hexSize;
            let y = -x - z;
            let rx = Math.round(x), ry = Math.round(y), rz = Math.round(z);
            if (Math.abs(rx-x) > Math.abs(ry-y) && Math.abs(rx-x) > Math.abs(rz-z)) rx = -ry-rz;
            else if (Math.abs(ry-y) > Math.abs(rz-z)) ry = -rx-rz;
            else rz = -rx-ry;
            return { x: rx, y: ry, z: rz };
        }

        canvas.onclick = (e) => {
            const target = getCube(e.clientX, e.clientY);
            const l1 = (Math.abs(target.x) + Math.abs(target.y) + Math.abs(target.z)) / 2;
            document.getElementById('coords').innerText = `座標: (${target.x}, ${target.y}, ${target.z})`;
            document.getElementById('dist').innerText = `L1 Dist: ${l1}`;

            // --- Delta-space 2.0: 6軸 Greedy 残差分解ロジック ---
            let rx = target.x, ry = target.y, rz = target.z;
            const digitsDiv = document.getElementById('digits');
            digitsDiv.innerHTML = "";
            let keyBinary = "";

            // 12 Digits 分解
            for(let d = 0; d < 12; d++) {
            if (rx === 0 && ry === 0 && rz === 0) {
 　　　　   digit = 0; // 00000
  　　　　　  continue;
　　　　　}
                let maxDot = -1;
                let bestDirIdx = 0;

                // 内積最大方向を選ぶ Greedy
                for(let i = 0; i < 6; i++) {
                    const dot = rx * DIR6[i].x + ry * DIR6[i].y + rz * DIR6[i].z;
                    if(dot > maxDot) {
                        maxDot = dot;
                        bestDirIdx = i;
                    }
                }

                // 5bit Digit 符号化 (方向 3bit + 符号/余剰 2bit 相当の概念)
                const digitValue = bestDirIdx; // 実際の実装ではここで残差強度も考慮
                keyBinary += digitValue.toString(2).padStart(5, '0');

                const div = document.createElement('div');
                div.className = "digit-item";
                div.innerHTML = `D${d.toString().padStart(2,'0')}: Dir${bestDirIdx} [${keyBinary.slice(-5)}]`;
                digitsDiv.appendChild(div);

                // 残差更新 (1ステップ分を減算)
                rx -= DIR6[bestDirIdx].x;
                ry -= DIR6[bestDirIdx].y;
                rz -= DIR6[bestDirIdx].z;
            }

            document.getElementById('key-display').innerText = `Key: 0x${target.x.toString(16).padStart(4,'0')}${target.y.toString(16).padStart(4,'0')}${target.z.toString(16).padStart(4,'0')}`.toUpperCase();
            
            draw();
            highlightHex(target.x, target.y, target.z);
        };

        function draw() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let q = -30; q <= 30; q++) {
                for (let r = Math.max(-30, -q-30); r <= Math.min(30, -q+30); r++) {
                    const pos = { x: hexSize * 3/2 * q + canvas.width/2, y: hexSize * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r) + canvas.height/2 };
                    ctx.beginPath();
                    for(let i=0; i<6; i++) ctx.lineTo(pos.x + hexSize * Math.cos(Math.PI/3*i), pos.y + hexSize * Math.sin(Math.PI/3*i));
                    ctx.closePath(); ctx.strokeStyle = "#111"; ctx.stroke();
                }
            }
        }

        function highlightHex(x, y, z) {
            const p = { x: hexSize * 3/2 * x + canvas.width/2, y: hexSize * (Math.sqrt(3)/2 * x + Math.sqrt(3) * z) + canvas.height/2 };
            ctx.beginPath();
            for(let i=0; i<6; i++) ctx.lineTo(p.x + hexSize * Math.cos(Math.PI/3*i), p.y + hexSize * Math.sin(Math.PI/3*i));
            ctx.closePath(); ctx.fillStyle = "rgba(0, 229, 255, 0.3)"; ctx.fill();
            ctx.strokeStyle = "#00ff88"; ctx.lineWidth = 2; ctx.stroke();
        }

        window.onresize = draw;
        draw();
    </script>
</body>
</html>
